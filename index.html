<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuy Menabung Otot - Jadwal Gym Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS VARIABEL & BASE STYLE TEMAN GELAP METALIK */
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --accent: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        #rentangTanggal {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* CARD NEXT WORKOUT BANNER */
        .next-workout-card {
            background: linear-gradient(135deg, #1e1b4b, #311042);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        .next-workout-icon {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        /* FORM PANEL INPUT */
        .form-panel {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-control {
            background-color: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .btn {
            background-color: var(--primary);
            color: #000;
            font-weight: 600;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* GRID LAYOUT JADWAL CARD */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .day-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.05);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .day-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
            border-color: rgba(56, 189, 248, 0.2);
        }

        .day-card.today {
            border: 2px solid var(--primary);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.75rem;
        }

        .day-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .day-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .badge-today {
            background-color: var(--primary);
            color: #000;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
        }

        /* SHIFT CONTAINER STYLE */
        .shift-block {
            background-color: rgba(255,255,255,0.02);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .shift-block:last-child {
            margin-bottom: 0;
        }

        .shift-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        /* PROGRESS BAR KAPASITAS */
        .progress-container {
            background-color: rgba(255,255,255,0.05);
            border-radius: 4px;
            height: 6px;
            width: 100%;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-bar.warning { background-color: #f59e0b; }
        .progress-bar.danger { background-color: var(--accent); }

        /* TAG PESERTA OVAL */
        .participant-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            min-height: 24px;
        }

        .participant-tag {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .participant-tag:hover {
            background-color: rgba(244, 63, 94, 0.15);
            color: var(--accent);
            border-color: rgba(244, 63, 94, 0.3);
        }

        .empty-state {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* MODAL DIALOG CUSTOM (GANTI CONFIRM DEFAULT) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1; pointer-events: auto;
        }

        .modal-box {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.8);
            transition: var(--transition);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        /* TOAST NOTIFICATION WINDOW */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            background-color: var(--bg-card);
            border-left: 4px solid var(--primary);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(120%);
            transition: var(--transition);
        }

        .toast.active { transform: translateX(0); }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--accent); }

        /* SKELETON LOADERS */
        .skeleton-card {
            background-color: var(--bg-card);
            height: 250px;
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
        }

        .skeleton-card::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: loadingSkeleton 1.5s infinite;
        }

        @keyframes loadingSkeleton {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>KUY MENABUNG OTOT</h1>
            <div id="rentangTanggal"><i class="fas fa-spinner fa-spin"></i> Menghitung kalender...</div>
        </header>

        <div id="nextWorkoutBanner" class="next-workout-card">
            <div class="next-workout-icon">
                <i class="fas fa-dumbbell"></i>
            </div>
            <div>
                <h3 style="font-weight: 600; font-size: 1.1rem; color: var(--primary);">Jadwal Latihan Terdekat</h3>
                <p id="nextWorkoutInfo" style="font-size: 0.95rem; margin-top: 0.25rem;">Mencari jadwal aktif...</p>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-grid">
                <div class="form-group">
                    <label for="inputNama">Nama Peserta</label>
                    <input type="text" id="inputNama" class="form-control" placeholder="Contoh: Yudis" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="pilihHari">Pilih Hari</label>
                    <select id="pilihHari" class="form-control">
                        <option value="Senin">Senin</option>
                        <option value="Selasa">Selasa</option>
                        <option value="Rabu">Rabu</option>
                        <option value="Kamis">Kamis</option>
                        <option value="Jumat">Jumat</option>
                        <option value="Sabtu">Sabtu</option>
                        <option value="Minggu">Minggu</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="pilihShift">Pilih Shift</label>
                    <select id="pilihShift" class="form-control">
                        <option value="Pagi">Pagi (08:00 - 11:00)</option>
                        <option value="Sore">Sore (16:00 - 20:00)</option>
                    </select>
                </div>
                <button id="tombolIkut" class="btn">
                    <i class="fas fa-user-plus"></i> Gabung Latihan
                </button>
            </div>
        </div>

        <div id="scheduleContainer" class="schedule-grid">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>
    </div>

    <div id="customModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h3 style="margin-bottom: 0.5rem; font-size: 1.25rem;">Batalkan Latihan?</h3>
            <p id="modalMessage" style="color: var(--text-muted); font-size: 0.95rem;">Apakah kamu yakin ingin membatalkan jadwal latihan ini?</p>
            <div class="modal-buttons">
                <button id="btnModalCancel" class="btn" style="background-color: var(--bg-input); color: white;">Batal</button>
                <button id="btnModalConfirm" class="btn" style="background-color: var(--accent); color: white;">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
